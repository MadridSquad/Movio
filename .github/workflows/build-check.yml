name: Build Check

on:
  pull_request:
    branches: [develop]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Create secret.properties file
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }} # Base64 encoded .jks
        run: |
          mkdir -p app
          echo "$KEYSTORE_FILE" | base64 -d > app/keystore.jks
          ls -l app/keystore.jks  # Debug check
          echo "API_KEY = \"$API_KEY\"" > secret.properties
          echo "BASE_URL = \"$BASE_URL\"" >> secret.properties
          echo "KEYSTORE_FILE = \"app/keystore.jks\"" >> secret.properties
          echo "KEYSTORE_PASSWORD = \"$KEYSTORE_PASSWORD\"" >> secret.properties
          echo "KEY_ALIAS = \"$KEY_ALIAS\"" >> secret.properties
          echo "KEY_PASSWORD = \"$KEY_PASSWORD\"" >> secret.properties
      

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --build-cache -x test -x lint

      - name: Ensure APK is generated
        run: ls -l app/build/outputs/apk/release/app-release.apk || { echo "APK not generated"; exit 1; }