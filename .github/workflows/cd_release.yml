name: Firebase CD - Distribute APK

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 4. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5. Decode google-services.json
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      # 6. Decode keystore & create secret.properties
      - name: Create secret.properties
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }} # Base64 encoded .jks
        run: |
          mkdir -p app
          echo "$KEYSTORE_FILE" | base64 -d > app/keystore.jks
          ls -l app/keystore.jks  # Debug check
          echo "API_KEY = \"$API_KEY\"" > secret.properties
          echo "BASE_URL = \"$BASE_URL\"" >> secret.properties
          echo "KEYSTORE_FILE = \"app/keystore.jks\"" >> secret.properties
          echo "KEYSTORE_PASSWORD = \"$KEYSTORE_PASSWORD\"" >> secret.properties
          echo "KEY_ALIAS = \"$KEY_ALIAS\"" >> secret.properties
          echo "KEY_PASSWORD = \"$KEY_PASSWORD\"" >> secret.properties
      

      # 7. Build signed release APK
      - name: Build Signed Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 8. Verify APK exists
      - name: Ensure APK is generated
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found"
            exit 1
          fi
          echo "✅ Found APK: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      # 9. Extract release notes from last commit
      - name: Extract Release Notes
        id: release_notes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | sed 's/"/\\"/g' | tr -d '\n')
          TRUNCATED_MSG="${COMMIT_MSG:0:500}"
          echo "$TRUNCATED_MSG" > release_notes.txt
          echo "notes=$TRUNCATED_MSG" >> $GITHUB_OUTPUT
          echo "Release notes: $TRUNCATED_MSG"

      # 10. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 11. Decode Firebase service account
      - name: Decode Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "${{ github.workspace }}/firebase-service-account.json"

      # 12. Set GOOGLE_APPLICATION_CREDENTIALS env var
      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json" >> $GITHUB_ENV

      # 13. Upload to Firebase App Distribution
      - name: Upload APK to Firebase App Distribution
        run: |
          firebase appdistribution:distribute \
            "$APK_PATH" \
            --app "1:1038392982530:android:86b7c8565bb5aec276bb1b" \
            --groups "release-testers" \
            --release-notes-file release_notes.txt
